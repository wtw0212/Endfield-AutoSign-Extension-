<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <title>Welcome - SKPORT Auto Sign-in</title>
  <style>
    body {
      margin: 0;
      background: #f5f5f7;
      color: #222;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    .panel {
      background: #fff;
      border: 1px solid #e4e4e7;
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }

    h2 {
      margin: 28px 0 10px;
      font-size: 18px;
    }

    p, label {
      font-size: 15px;
      line-height: 1.65;
    }

    .setting {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
    }

    .setting input[type="time"] {
      padding: 6px 8px;
      border: 1px solid #c9c9cf;
      border-radius: 6px;
      font: inherit;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 16px;
      color: #fff;
      background: #008CBA;
      cursor: pointer;
      font: inherit;
      font-weight: 600;
    }

    button.secondary {
      background: #666;
    }

    .note {
      margin-top: 22px;
      padding: 14px 16px;
      background: #e8f4fd;
      border-radius: 8px;
      color: #145a9e;
    }

    #msg {
      margin-top: 12px;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <main>
    <section class="panel">
      <h1>SKPORT 自動簽到已安裝</h1>
      <p>請選擇要自動簽到的網站與每日執行時間。若略過設定，會使用預設時間 00:10，並啟用 Endfield 與明日方舟。</p>

      <h2>簽到網站</h2>
      <div class="setting">
        <input type="checkbox" id="enableEndfield" checked>
        <label for="enableEndfield">啟用 Endfield 簽到</label>
      </div>
      <div class="setting">
        <input type="checkbox" id="enableArknights" checked>
        <label for="enableArknights">啟用明日方舟簽到</label>
      </div>

      <h2>簽到時間</h2>
      <div class="setting">
        <label for="checkTime">每日執行時間</label>
        <input type="time" id="checkTime" value="00:10">
      </div>

      <div class="note">
        請先確認瀏覽器已登入 SKPORT 帳號。成功簽到後背景分頁會自動關閉；若簽到失敗，分頁會保留開啟方便確認。
      </div>

      <div class="actions">
        <button id="saveBtn">儲存設定</button>
        <button id="skipBtn" class="secondary">略過，使用預設值</button>
      </div>
      <div id="msg"></div>
    </section>
  </main>

  <script src="settings.js"></script>
  <script src="welcome.js"></script>
</body>

</html>
